name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Hugging Face Spaces
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare Hugging Face Deployment Directory
        run: |
          # Create a temp directory for HF files
          mkdir -p ../hf-deploy
          
          # Copy backend files to the temp deployment root
          cp -r backend/* ../hf-deploy/
          
          # Rename the Hugging Face Dockerfile to be the primary Dockerfile
          mv ../hf-deploy/Dockerfile.hf ../hf-deploy/Dockerfile
          
          # Create the README.md with HF Spaces metadata
          cat << 'EOF' > ../hf-deploy/README.md
          ---
          title: Auto Job Hunter AI
          emoji: 🚀
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_port: 7860
          ---
          
          # Auto Job Hunter AI - FastAPI Backend & Scraper
          This container runs the autonomous job search engine, background workers, and Playwright integration.
          EOF

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          cd ../hf-deploy
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy: Auto Job Hunter AI Backend"
          git remote add origin https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}
          git push -f origin main
